{% extends 'base.html' %}

{% block title %}Report Submitted - TruthGuard{% endblock %}

{% block content %}
<section class="success-section">
    <div class="container">
        <div class="success-card glass-card fade-in">
            <div class="success-icon">✓</div>
            <h1>Report Submitted</h1>
            <p>Thank you for helping protect the community. Our moderation team will review your report shortly.</p>
            <div class="success-actions">
                <a href="{% url 'search' %}" class="btn-primary">Search Entities</a>
                <a href="{% url 'report' %}" class="btn-secondary">Submit Another</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
