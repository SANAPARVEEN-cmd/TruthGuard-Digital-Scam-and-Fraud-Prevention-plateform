{% extends 'base.html' %}

{% block title %}Login - TruthGuard{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container glass-card fade-in">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Sign in to your TruthGuard account</p>
        </div>
        <form method="post" class="auth-form">
            {% csrf_token %}
            {% if form.non_field_errors %}
            <div class="form-error">{{ form.non_field_errors.0 }}</div>
            {% endif %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" required>
            </div>
            <button type="submit" class="btn-primary btn-full ripple">Sign In</button>
        </form>
        <div class="auth-links">
            <a href="{% url 'forgot_password' %}">Forgot password?</a>
            <a href="{% url 'register' %}">Create account</a>
        </div>
    </div>
</section>
{% endblock %}
